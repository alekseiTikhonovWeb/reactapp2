name: Aleksei's CI/CD with Docker


on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME || secrets.DOCKER_USERNAME }}
          password: ${{ vars.DOCKER_PASSWORD || secrets.DOCKER_PASSWORD }}

      - name: Build Frontend Docker image
        run: docker build -t reactapp2 -f Dockerfile .

      - name: Push Frontend Docker image to Docker Hub
        run: |
          docker tag reactapp2 "${{ vars.DOCKER_USERNAME || secrets.DOCKER_USERNAME }}"/reactapp2
          docker push "${{ vars.DOCKER_USERNAME || secrets.DOCKER_USERNAME }}"/reactapp2
