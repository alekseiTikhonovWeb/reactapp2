name: Aleksei's CI/CD with Docker

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Frontend Docker image
        run: docker build -t reactapp2 -f Dockerfile .

      - name: Push Frontend Docker image to Docker Hub
        run: |
          echo "${{ vars.DOCKER_PASSWORD || secrets.DOCKER_PASSWORD }}" | docker login -u "${{ vars.DOCKER_USERNAME || secrets.DOCKER_USERNAME }}" --password-stdin
          docker tag reactapp2 "${{ vars.DOCKER_USERNAME || secrets.DOCKER_USERNAME }}"/reactapp2
          docker push "${{ vars.DOCKER_USERNAME || secrets.DOCKER_USERNAME }}"/reactapp2
